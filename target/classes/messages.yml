# ┌──────────────────────────────────────────────┐
# │        ServerManager Messages (MiniMessage)  │
# │    Placeholders: {player}, {password}, etc.  │
# │    Supports PlaceholderAPI if installed.      │
# └──────────────────────────────────────────────┘

# ─── Password delivery ────────────────────────────────────────
password:
  header: "<st><gray>                                                          </gray></st>"
  body: "<green>⚡</green> <white>Mật khẩu của bạn: <gold><bold>{password}</bold></gold></white>"
  footer: "<gray><italic>⚠ Hãy ghi nhớ! Mật khẩu chỉ hiển thị 1 lần duy nhất. Nhấn vào để copy.</italic></gray>"
  hover: "<yellow>📋 Nhấn để copy mật khẩu</yellow>"

# ─── Command responses ────────────────────────────────────────
command:
  no-permission: "<red>✘ Bạn không có quyền sử dụng lệnh này.</red>"
  not-implemented: "<yellow>⚠ Chức năng này chưa được triển khai.</yellow>"
  reload-success: "<green>✔ Đã reload cấu hình thành công!</green>"

  help: |
    <gold><bold>━━━ ServerManager Admin ━━━</bold></gold>
    <white>/admin list <gray>[page]</gray></white> <dark_gray>-</dark_gray> <gray>Danh sách player đã cấp</gray>
    <white>/admin grant <gray><player></gray></white> <dark_gray>-</dark_gray> <gray>Cấp password cho player</gray>
    <white>/admin revoke <gray><player></gray></white> <dark_gray>-</dark_gray> <gray>Thu hồi password</gray>
    <white>/admin reload</white> <dark_gray>-</dark_gray> <gray>Reload cấu hình</gray>

  usage-grant: "<red>✘ Sử dụng: /admin grant <player></red>"
  usage-revoke: "<red>✘ Sử dụng: /admin revoke <player></red>"
  player-never-joined: "<red>✘ Người chơi <white>{player}</white> chưa từng vào server.</red>"
  already-granted: "<yellow>⚠ Người chơi <white>{player}</white> đã được cấp password rồi.</yellow>"
  not-granted: "<red>✘ Người chơi <white>{player}</white> chưa được cấp password.</red>"
  grant-success-online: "<green>✔ Đã cấp password cho <white>{player}</white> (đã gửi trực tiếp).</green>"
  grant-success-offline: "<green>✔ Đã cấp password cho <white>{player}</white> (sẽ gửi khi online).</green>"
  revoke-success: "<green>✔ Đã thu hồi password của <white>{player}</white>.</green>"

  login-success: "<green>✔ Đăng nhập thành công!"
  logout-success: "<green>✔ Đã đăng xuất thành công.</green>"
  command-blocked-in-special-mode: "<red>✘ Không thể dùng lệnh.</red>"
  wrong-password-retry: "<red>✘ Sai password, còn {retry} lần thử.</red>"
  wrong-password: "<red>✘ Sai password! vui lòng thử lại sau.</red>"

# ─── List display ─────────────────────────────────────────────
list:
  empty: "<yellow>⚠ Chưa có người chơi nào được cấp password.</yellow>"
  header: "<gold><bold>━━━ Danh sách ({total_players} người chơi) ━━━</bold></gold> <gray>Trang {page}/{total_pages}</gray>"
  entry: " <gray>{index}.</gray> <white>{player}</white> <dark_gray>({uuid})</dark_gray>"
  footer: "<gold><bold>━━━━━━━━━━━━━━━━━━━━━━━</bold></gold>"
